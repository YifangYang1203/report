name: Daily AI Research Brief

on:
  schedule:
    # 07:30 Asia/Shanghai (23:30 UTC on the previous day)
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Generate and send focused brief
        env:
          TZ: Asia/Shanghai
          NEWS_LOOKBACK_HOURS: '48'
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          ITEMS_PER_TOPIC: '4'
        run: python report_daily.py --send
      - name: Upload generated brief
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: reports/latest.md
          if-no-files-found: error
